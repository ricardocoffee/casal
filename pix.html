<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pix Presente</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f5f5f5;
font-family:Arial, sans-serif;
}

.container{
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
text-align:center;
max-width:320px;
width:90%;
}

.pix{
font-size:22px;
font-weight:bold;
margin:15px 0;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#ffd700;
cursor:pointer;
font-size:16px;
}

#msg{
margin-top:10px;
color:green;
display:none;
}
</style>
</head>

<body>

<div class="container">

<h2>Presente via Pix</h2>

<div class="pix">059.291.702.90</div>
<div>MERCADO PAGO - Eikna Rita</div>

<br>

<button id="copiar">Copiar chave Pix</button>

<div id="msg">✔ Pix copiado!</div>

</div>

<script>

const botao = document.getElementById("copiar")
const msg = document.getElementById("msg")
const chave = "059.291.702.90"

botao.onclick = async () => {

  try{
    await navigator.clipboard.writeText(chave)
  }catch{
    const input = document.createElement("input")
    input.value = chave
    document.body.appendChild(input)
    input.select()
    document.execCommand("copy")
    document.body.removeChild(input)
  }

  msg.style.display="block"

  setTimeout(()=>{
    msg.style.display="none"
  },2000)

}

</script>

</body>
</html>
